<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Free EMI Calculator</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <div class="logo-icon">F</div>
                <span>Free EMI Calculator</span>
            </div>
            <div class="language-selector">
                <div class="flag-icon"></div>
                <span>English</span>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <h1>Contact Us</h1>
            <p>Have a question, suggestion, or feedback about Free EMI Calculator? Use the form below to get in touch with us.</p>

            <form class="contact-form" action="#" method="post">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Enter a subject" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="Write your message" required></textarea>
                </div>

                <button type="submit" class="contact-submit">Submit</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-links">
                <a href="index.html">Home</a> |
                <a href="about.html">About</a> |
                <a href="disclaimer.html">Disclaimer</a> |
                <a href="privacy-policy.html">Privacy Policy</a> |
                <a href="contact.html">Contact</a> |
                <a href="sitemap.html">Sitemap</a>
            </div>
            <p>Made with in ❤️ You & Me.</p>
            <p>©2026 Free EMI Calculator</p>
        </div>
    </footer>
</body>
</html>
